camera_forward:
  ros__parameters:
    # GStreamer pipeline feeding gscam's appsink. /dev/cam_forward is the udev
    # symlink for the Logitech BRIO (capture node, MJPG-capable). MJPG keeps
    # USB bandwidth manageable at higher resolutions.
    gscam_config: "v4l2src device=/dev/cam_forward do-timestamp=true ! image/jpeg,width=640,height=480,framerate=30/1 ! jpegparse ! jpegdec ! videoconvert"
    camera_name: "camera_forward"
    frame_id: "camera_forward_link"
    sync_sink: false
    use_gst_timestamps: true

    # camera_info comes from a sibling YAML in this package's share dir.
    # Empty here would make gscam fall back to ${ROS_HOME}/camera_info/<name>.yaml
    # which doesn't exist on a fresh install and logs a noisy ERROR.
    # Calibrate via `ros2 run camera_calibration cameracalibrator` and replace
    # config/camera_forward_info.yaml.
    camera_info_url: "package://racecar_neo_ros2_driver/config/camera_forward_info.yaml"
